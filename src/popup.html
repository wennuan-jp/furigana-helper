<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furigana Helper Settings</title>
  <link rel="stylesheet" href="./popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <h2>Furigana Helper</h2>
      <p class="subtitle">Quickly view Japanese readings</p>
    </header>


    <div id="key-recorder" class="key-recorder" tabindex="0">
      <span class="key-display" id="key-display">Control</span>
      <span class="recorder-hint" id="recorder-hint"> </span>
    </div>

    <div id="status-msg" class="status-msg"></div>
  </div>

  <script type="module" src="./popup.js"></script>
</body>

</html>
