<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furigana Helper Settings</title>
  <link rel="stylesheet" href="./popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <h2>Furigana Helper</h2>
      <p class="subtitle">Quickly view Japanese readings</p>
    </header>


    <div class="settings-list">
      <div class="setting-row" id="row-double-tap" data-mode="double-tap">
        <div class="mode-info">
          <div class="radio-circle"></div>
          <span class="label">Double Click</span>
        </div>
        <div class="key-recorder-mini" id="recorder-double-tap">
          <span class="key-text" id="display-double-tap">Control</span>
        </div>
      </div>

      <div class="setting-row" id="row-shortcut" data-mode="shortcut">
        <div class="mode-info">
          <div class="radio-circle"></div>
          <span class="label">Shortcut</span>
        </div>
        <div class="key-recorder-mini" id="recorder-shortcut">
          <span class="key-text" id="display-shortcut">Ctrl + K</span>
        </div>
      </div>
    </div>

    <div id="recorder-overlay" class="recorder-overlay hidden">
      <div class="overlay-content">
        <p id="overlay-hint">Press any key</p>
        <div id="overlay-display" class="overlay-display">...</div>
      </div>
    </div>

    <div id="status-msg" class="status-msg"></div>
  </div>

  <script type="module" src="./popup.js"></script>
</body>

</html>
